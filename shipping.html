<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Aotearoa Adventure Gear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom-style.css">
</head>
<body>

    <header class="border-bottom py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="logo">
                <img src="C:\Users\muham\OneDrive\Haris Documents\Open Polytechinic\BIT703 Web Technologies\BIT703 Web Technologies_A2\A2\img\BIT703-A2-01-AotearoaAdventureGearLogo-Graphic-2025-04.png" alt="Aotearoa Adventure Gear Logo" height="50">
            </div>
            <nav class="d-none d-md-block">
                <a href="index.html" class="px-2 text-decoration-none">Home</a>
                <a href="shop.html" class="px-2 text-decoration-none">About</a>
                <a href="shop.html" class="px-2 text-decoration-none">Shop</a>
                <a href="#" class="px-2 text-decoration-none">Help</a>
            </nav>
            <button class="btn btn-dark">Your Cart</button>
        </div>
    </header>

    <main class="container py-5">
    <!-- Progress indicator showing current checkout step -->
    <nav class="mb-5 border-bottom">
        <ul class="nav nav-justified pb-3">
            <li class="nav-item text-muted">1. Shopping Cart</li>
            <li class="nav-item">
                <span class="fw-bold border-bottom border-dark border-3 pb-3">2. Shipping Details</span>
            </li>
            <li class="nav-item text-muted">3. Payment Options</li>
        </ul>
    </nav>

    <div class="row g-5">
        <div class="col-md-8">
            <h2 class="fw-light mb-4 border-bottom pb-2">Shipping Details</h2>
            
            <!-- Shipping address form fields: basic contact and location information -->
            <form class="row g-3">
                <!-- Name: first and last name for the shipping label -->
                <div class="col-md-6">
                    <input type="text" class="form-control rounded-0" placeholder="First Name">
                </div>
                <div class="col-md-6">
                    <input type="text" class="form-control rounded-0" placeholder="Last Name">
                </div>

                <!-- Street address lines: primary and secondary (apt / unit) -->
                <div class="col-12">
                    <input type="text" class="form-control rounded-0" placeholder="Address">
                </div>
                <div class="col-12">
                    <input type="text" class="form-control rounded-0" placeholder="Address 2">
                </div>

                <!-- Country and city: used for shipping calculations and labels -->
                <div class="col-md-6">
                    <select class="form-select rounded-0 text-muted">
                        <option selected>Country</option>
                        <option>New Zealand</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <input type="text" class="form-control rounded-0" placeholder="City">
                </div>

                <!-- Postal code and phone: postal for carrier, phone for delivery contact -->
                <div class="col-md-6">
                    <input type="text" class="form-control rounded-0" placeholder="Zip/Postal Code">
                </div>
                <div class="col-md-6">
                    <input type="tel" class="form-control rounded-0" placeholder="Phone Number">
                </div>

                <!-- Shipping method options: choose delivery speed.
                     Note: selecting an option typically changes the shipping cost
                     and should update the order total (can be handled with JS).
                -->
                <div class="col-12 mt-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="border p-3 d-flex align-items-start bg-light">
                                <!-- Free shipping selected by default -->
                                <input type="radio" name="shipMethod" class="mt-1 me-3" checked>
                                <div>
                                    <label class="d-block fw-bold small">Free Shipping</label>
                                    <small class="text-muted">Between 2 - 5 working days</small>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="border p-3 d-flex align-items-start">
                                <!-- Paid expedited option; adds to the total when chosen -->
                                <input type="radio" name="shipMethod" class="mt-1 me-3">
                                <div>
                                    <label class="d-block fw-bold small">Next Day Delivery - $20</label>
                                    <small class="text-muted">24 hours from checkout</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 mt-5 d-flex gap-3">
                    <button type="submit" class="btn btn-dark px-5 py-2 rounded-0">Next</button>
                    <button type="button" class="btn btn-light border px-5 py-2 rounded-0">Cancel</button>
                </div>
            </form>
        </div>

        <div class="col-md-4">
            <div class="p-4 border">
                <h3 class="fw-light border-bottom pb-3">Summary</h3>
                
                <div class="d-flex align-items-center mb-3">
                    <div class="bg-light p-2 border me-3"><i class="bi bi-image"></i></div>
                    <div class="small">
                        <div class="fw-bold">PRODUCT NAME</div>
                        <div class="text-muted">$300</div>
                    </div>
                </div>
                <div class="d-flex align-items-center mb-4">
                    <div class="bg-light p-2 border me-3"><i class="bi bi-image"></i></div>
                    <div class="small">
                        <div class="fw-bold">PRODUCT NAME</div>
                        <div class="text-muted">$300</div>
                    </div>
                </div>

                <!-- Order cost breakdown: shows subtotal, shipping cost and final total.
                     The elements use ids so JavaScript can update values when options change:
                     - `subtotal`: sum of item prices
                     - `shipping`: shows chosen shipping cost or label
                     - `total`: final amount (subtotal + shipping + taxes)
                -->
                <div class="border-top pt-3">
                    <!-- Subtotal row -->
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted small">SUBTOTAL</span>
                        <span class="small" id="subtotal">$600</span>
                    </div>
                    <!-- Shipping row (updates when a shipping method is chosen) -->
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted small">SHIPPING</span>
                        <span class="small" id="shipping">FREE</span>
                    </div>
                    <!-- Final total: calculated from subtotal + shipping (+ taxes if any) -->
                    <div class="d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">TOTAL</h4>
                        <h4 class="mb-0" id="total">$613</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

    <footer class="bg-white border-top py-5 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Aotearoa Adventure Gear - New Zealand</p>
        </div>
    </footer>


<script src="js/script.js"></script>
</body>
</html>
