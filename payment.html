<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Aotearoa Adventure Gear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom-style.css">
</head>
<body>

    <!-- Header: Contains site logo, navigation links, and cart button -->
    <header class="border-bottom py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="logo">
                <img src="BIT703-A2-01-AotearoaAdventureGearLogo-Graphic-2025-04.png" alt="Aotearoa Adventure Gear Logo" height="50">
            </div>
            <nav class="d-none d-md-block">
                <a href="index.html" class="px-2 text-decoration-none">Home</a>
                <a href="shop.html" class="px-2 text-decoration-none">About</a>
                <a href="shop.html" class="px-2 text-decoration-none">Shop</a>
                <a href="#" class="px-2 text-decoration-none">Help</a>
            </nav>
            <button class="btn btn-dark">Your Cart</button>
        </div>
    </header>

    <!-- Section for selecting payment option (credit card or PayPal) -->
    <!--
         The form displays two payment choices. By default the credit card option is selected.
         JavaScript could toggle which fields are visible when the user picks PayPal vs Credit Card.
         Elements to note for JS/backend integration:
          - radio inputs named `paymentType` determine which method is chosen
          - card inputs collect: card number, expiry, cvv and card holder name
          - PayPal selection would normally redirect the user to PayPal's checkout flow
    -->
    <section class="payment-methods mb-5">
    <h2 class="fw-light mb-4 border-bottom pb-2">Payment method</h2>

    <div class="border p-4 mb-3">
        <!-- Credit card option: form fields below are used to collect card details -->
        <div class="form-check mb-4">
            <input class="form-check-input" type="radio" name="paymentType" id="creditCard" checked>
            <label class="form-check-label fw-bold" for="creditCard">Credit Card</label>
            <p class="text-muted small mb-0">Use a debit or credit card to complete your purchase.</p>
        </div>
        
        <div class="row g-3">
            <div class="col-md-7">
                <!-- Card number field: consider adding input masking/validation in JS -->
                <div class="input-group">
                    <input type="text" class="form-control rounded-0" placeholder="0000 0000 0000 0000">
                    <span class="input-group-text bg-white"><i class="bi bi-credit-card"></i></span>
                </div>
            </div>
            <div class="col-md-3">
                <!-- Expiry date field -->
                <input type="text" class="form-control rounded-0" placeholder="MM / YY">
            </div>
            <div class="col-md-2">
                <!-- CVV + tooltip icon: CVV is sensitive; ensure secure handling server-side -->
                <div class="input-group">
                    <input type="text" class="form-control rounded-0" placeholder="CVV">
                    <span class="input-group-text bg-white p-1"><i class="bi bi-info-circle small"></i></span>
                </div>
            </div>
            <div class="col-12">
                <!-- Card holder name as printed on the card -->
                <input type="text" class="form-control rounded-0" placeholder="Card Holder Name">
            </div>
        </div>
    </div>

    <!-- PayPal option: selecting this would normally send the user to PayPal checkout -->
    <div class="border p-4 d-flex justify-content-between align-items-center">
        <div class="form-check">
            <input class="form-check-input" type="radio" name="paymentType" id="paypal">
            <label class="form-check-label fw-bold" for="paypal">Paypal</label>
            <p class="text-muted small mb-0">Pay via your PayPal account — you will be redirected to PayPal.</p>
        </div>
        <img src="PayPal_Logo_Icon_2014.svg.png" alt="PayPal" height="30">
    </div>
</section>

    <!-- Footer: simple copyright text -->
    <footer class="bg-white border-top py-5 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Aotearoa Adventure Gear - New Zealand</p>
        </div>
    </footer>

<script src="js/script.js"></script>
</body>

</html>
